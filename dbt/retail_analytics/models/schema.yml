version: 2

models:
  - name: stg_customers
    description: Cleaned customer records from the raw layer.
    columns:
      - name: customer_id
        description: Primary key.
        tests: [unique, not_null]
      - name: email
        tests: [not_null]

  - name: stg_products
    description: Cleaned product catalog.
    columns:
      - name: product_id
        tests: [unique, not_null]

  - name: stg_orders
    description: Standardized order lines (status lowercased, discounts numeric).
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: status
        tests:
          - accepted_values:
              values: [completed, shipped, returned, cancelled]

  - name: dim_customers
    description: One row per customer with lifetime order metrics.
    columns:
      - name: customer_id
        tests: [unique, not_null]

  - name: dim_products
    description: One row per product.
    columns:
      - name: product_id
        tests: [unique, not_null]

  - name: fct_orders
    description: >
      Order-line fact table. Cancelled orders excluded.
      Grain: one row per order_id.
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: customer_id
        description: FK to dim_customers.
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_id
      - name: product_id
        description: FK to dim_products.
        tests:
          - not_null
          - relationships:
              to: ref('dim_products')
              field: product_id
      - name: net_revenue
        description: quantity * unit_price * (1 - discount_rate).
